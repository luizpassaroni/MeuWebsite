    .ios-stat-value { font-size: 24px; font-weight: 800; color: var(--ios-blue); }
    .ios-stat-label { font-size: 11px; color: var(--ios-text-secondary); margin-top: 4px; text-transform: uppercase; font-weight: 600; }
    .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 14px 16px; background: var(--ios-card); border-radius: 1.2rem; box-shadow: var(--ios-shadow); border: 1px solid var(--ios-separator); }
    .progress-track { flex: 1; height: 6px; background: var(--ios-separator); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--ios-blue), var(--ios-purple)); border-radius: 99px; transition: width 0.45s cubic-bezier(0.4,0,0.2,1); }

    .btn.primary { background: var(--ios-blue); border-color: var(--ios-blue); color: #fff; width: 100%; padding: 14px; font-size: 16px; }

    .btn-group { display: flex; gap: 12px; margin-top: 24px; }
    .btn-group .btn { flex: 1; padding: 14px; }
    .control-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--ios-separator); gap: 12px; }

    .shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .error-msg { color: var(--ios-red); font-size: 13px; margin-top: 8px; display: none; text-align: center; }

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}

    </div>`;
}

// ATUALIZAÇÃO 1: Requisição de senha vai para /login
async function checkPass(){
  if(!captchaToken){document.getElementById('captcha-error').style.display='block';return;}
  const password=document.getElementById('pass-input').value;
  if(!password){document.getElementById('error-msg').textContent='❌ Digite a senha.';document.getElementById('error-msg').style.display='block';return;}
  const btn=document.getElementById('enter-btn');
  btn.disabled=true;btn.innerHTML='<div class="loading"></div> Validando...';
  document.getElementById('success-msg').style.display='block';
  document.getElementById('error-msg').style.display='none';
  try{
    const res=await fetch(WORKER_URL + '/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:captchaToken,password})
    });
    const data=await res.json();
    if(data.success&&data.session){
      sessionToken=data.session;
      sessionStorage.setItem('quiz_session',sessionToken);
      renderHome();
    }else{throw new Error(data.error??'Falhou');}
  }catch(err){
    btn.disabled=false;btn.innerHTML='🔓 Entrar';
    document.getElementById('success-msg').style.display='none';
    const msg=err.message==='Wrong password'?'❌ Senha incorreta!':err.message==='Too many attempts'?'⏳ Muitas tentativas. Aguarde 10 minutos.':'❌ Erro de validação. Tente novamente.';
    document.getElementById('error-msg').textContent=msg;
    document.getElementById('error-msg').style.display='block';
    document.getElementById('lock-screen').classList.add('shake');
    setTimeout(()=>document.getElementById('lock-screen').classList.remove('shake'),400);
  }
}

function renderHome(){
  captchaToken=null;
  document.getElementById('quiz-header').style.display='block';
  document.getElementById('stat-cards').style.display='none';
  document.getElementById('progress-wrap').style.display='none';
  updateStats();
  document.getElementById('quiz-content').innerHTML=`
    <div class="start-card">
      <div class="start-icon-wrap">🌐</div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;">Quiz de Redes</h2>
      <p style="font-size:17px;line-height:1.6;color:var(--ios-text-secondary);margin-bottom:24px;">Teste seus conhecimentos em protocolos, encapsulamento, DNS, TCP/UDP e muito mais.</p>
      <div class="info-grid">
        <div class="info-box"><div class="info-num">70</div><div class="info-lbl">Questões</div></div>
        <div class="info-box"><div class="info-num">4</div><div class="info-lbl">Alternativas</div></div>
        <div class="info-box"><div class="info-num">∞</div><div class="info-lbl">Tentativas</div></div>
      </div>
      <div class="topics">
        <span class="ios-badge">🔗 TCP/UDP</span><span class="ios-badge">🌍 DNS</span>
        <span class="ios-badge">📦 Encapsulamento</span><span class="ios-badge">↔️ Janela Deslizante</span>
        <span class="ios-badge">🔄 Protocolos</span><span class="ios-badge">🔍 Análise</span>
      </div>
      <button class="btn primary" onclick="startQuiz()">▶️ Iniciar Quiz</button>
    </div>`;
}

function startQuiz(){
  questions=shuffle([...rawQuestions]).map(q=>({...q,opts:shuffle([...q.opts])}));
  started=true;current=0;score=0;answered=[];
  document.getElementById('stat-cards').style.display='grid';
  document.getElementById('progress-wrap').style.display='flex';
  updateStats();render();
}

function render(){
  const total=questions.length;
  document.getElementById('pbar').style.width=Math.round((current/total)*100)+'%';
  document.getElementById('plabel').textContent=current+' / '+total;
  updateStats();
  
  if(current>=total){renderScore();return;}
  
  const q=questions[current];
  const isAns=answered[current]!==undefined;
  const ansData=answered[current]; // Agora é um objeto vindo do servidor
  
  const optsHtml=q.opts.map((o,i)=>{
    let cls='opt';
    if(isAns){
      if(o === ansData.correctAnswer) cls+=' correct';
      else if(o === ansData.selected) cls+=' wrong';
    }
    return `<button class="${cls}" ${isAns?'disabled':''} onclick="choose('${o.replace(/'/g,"\\'")}')"><span class="letter">${LETTERS[i]}</span><span>${o}</span></button>`;
  }).join('');
  
  document.getElementById('quiz-content').innerHTML=`
    <div class="q-card">
      <div class="q-num">QUESTÃO ${current+1} DE ${total}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts-container">${optsHtml}</div>
      ${isAns?`<div class="feedback">${ansData.exp}</div>`:''}
      <div class="control-bar">
        <button class="btn" onclick="prev()" ${current===0?'disabled':''}>← Anterior</button>
        <button class="btn primary" onclick="next()" ${!isAns?'disabled':''} style="width:auto;">${current===total-1?'✓ Ver resultado':'Próxima →'}</button>
      </div>
    </div>`;
}

// ATUALIZAÇÃO 2: choose() agora conversa com o servidor para corrigir a resposta
async function choose(choice){
  if(answered[current]!==undefined) return; // Evita clique duplo
  
  // Efeito de carregamento e desativa clique visualmente
  const optsContainer = document.getElementById('opts-container');
  if(optsContainer) {
    optsContainer.style.opacity = '0.6';
    optsContainer.style.pointerEvents = 'none';
  }

  try {
    const res = await fetch(WORKER_URL + '/validar-resposta', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        questionId: questions[current].id,
        userAnswer: choice,
        sessionToken: sessionToken
      })
    });
    
    const data = await res.json();

    // Trata erro de token expirado
    if(data.error) {
      alert("⚠️ " + data.error);
      sessionStorage.removeItem('quiz_session');
      location.reload(); // Recarrega a página para logar de novo
      return;
    }

    // Armazena a correção do servidor no array
    answered[current] = {
      selected: choice,
      isCorrect: data.isCorrect,
      correctAnswer: data.correctAnswer,
      exp: data.explanation
    };

    if(data.isCorrect) score++;
    
    render(); // Redesenha a tela mostrando o certo, errado e explicação
    
  } catch(err) {
    console.error(err);
    alert("❌ Ocorreu um erro ao conectar com o servidor. Tente novamente.");
    if(optsContainer) {
      optsContainer.style.opacity = '1';
      optsContainer.style.pointerEvents = 'auto';
    }
  }
}

function next(){current++;render();}
function prev(){if(current>0){current--;render();}}

function renderScore(){
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=80?'🎉 Excelente!':pct>=60?'👍 Bom trabalho!':'📚 Continue estudando!';
  document.getElementById('quiz-content').innerHTML=`
    <div class="score-card" style="text-align:center;">
      <div class="score-ring"><div class="score-pct">${pct}%</div><div class="score-sub">Desempenho</div></div>
      <h2 style="font-size:22px;font-weight:700;">${msg}</h2>
      <p style="font-size:17px;margin-bottom:24px;color:var(--ios-text-secondary);">Você acertou <strong>${score} de ${questions.length}</strong> questões</p>
      <div class="btn-group">
        <button class="btn" onclick="startQuiz()">🔄 Tentar novamente</button>
        <button class="btn primary" onclick="renderHome()">🏠 Início</button>
      </div>
    </div>`;
  updateStats();
}

const saved=sessionStorage.getItem('quiz_session');
if(saved){sessionToken=saved;renderHome();}else{renderPasswordScreen();}
</script>
