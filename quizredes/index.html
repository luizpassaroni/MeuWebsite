<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz — Redes de Computadores</title>
  <meta name="color-scheme" content="light dark">
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    /* ── iOS Design System ── */
    :root {
      --ios-bg: #f2f2f7;
      --ios-card: #ffffff;
      --ios-text: #1c1c1e;
      --ios-text-secondary: #6e6e73;
      --ios-blue: #007AFF;
      --ios-green: #34C759;
      --ios-red: #FF3B30;
      --ios-purple: #AF52DE;
      --ios-separator: rgba(0,0,0,0.08);
      --ios-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ios-bg: #000000;
        --ios-card: #1c1c1e;
        --ios-text: #f2f2f7;
        --ios-text-secondary: #8e8e93;
        --ios-separator: rgba(255,255,255,0.08);
        --ios-shadow: 0 4px 20px rgba(0,0,0,0.4);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--ios-bg);
      color: var(--ios-text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .ios-title2 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
    .ios-body { font-size: 17px; font-weight: 400; line-height: 1.5; }
    .ios-subheadline { font-size: 15px; font-weight: 500; }
    .ios-badge-blue { background: rgba(0,122,255,0.15); color: var(--ios-blue); }

    .ios-tappable { cursor: pointer; transition: opacity 0.15s; -webkit-tap-highlight-color: transparent; }
    .ios-tappable:active:not(:disabled) { opacity: 0.65; }

    main { flex: 1; display: flex; flex-direction: column; padding-top: 1rem; padding-bottom: 3rem; }
    .container { margin: 0 auto; width: 100%; max-width: 720px; padding: 0 1.25rem; }

    #quiz-header {
      text-align: center;
      animation: fadeUp 0.5s ease both;
      margin-bottom: 0.5rem;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ios-blue);
      background: rgba(0,122,255,0.12);
      border: 1.5px solid rgba(0,122,255,0.2);
      border-radius: 20px;
      padding: 7px 14px;
      margin-bottom: 12px;
    }

    #quiz-header h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.6px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--ios-blue), var(--ios-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ios-stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .ios-stat-card {
      background: var(--ios-card);
      border-radius: 1.3rem;
      padding: 16px 12px;
      text-align: center;
      box-shadow: var(--ios-shadow);
      border: 1px solid var(--ios-separator);
    }

    .ios-stat-icon { font-size: 28px; margin-bottom: 8px; }
    .ios-stat-value { font-size: 24px; font-weight: 800; color: var(--ios-blue); }
    .ios-stat-label { font-size: 11px; color: var(--ios-text-secondary); margin-top: 4px; text-transform: uppercase; font-weight: 600; }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding: 14px 16px;
      background: var(--ios-card);
      border-radius: 1.2rem;
      box-shadow: var(--ios-shadow);
      border: 1px solid var(--ios-separator);
    }

    .progress-track {
      flex: 1;
      height: 6px;
      background: var(--ios-separator);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--ios-blue), var(--ios-purple));
      border-radius: 99px;
      transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
    }

    .progress-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--ios-blue);
      white-space: nowrap;
      min-width: 55px;
      text-align: right;
    }

    .q-card, .start-card, .score-card {
      background: var(--ios-card);
      border-radius: 1.5rem;
      padding: 24px;
      box-shadow: var(--ios-shadow);
      border: 1px solid var(--ios-separator);
      animation: fadeUp 0.3s ease both;
    }

    .q-num {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ios-blue);
      margin-bottom: 14px;
      opacity: 0.8;
    }

    .q-text {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.6;
      color: var(--ios-text);
      margin-bottom: 22px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 11px;
      margin-bottom: 20px;
    }

    .opt {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px;
      background: var(--ios-bg);
      border: 1.5px solid var(--ios-separator);
      border-radius: 16px;
      cursor: pointer;
      font-size: 16px;
      color: var(--ios-text);
      text-align: left;
      transition: all 0.15s cubic-bezier(0.3, 0, 0.3, 1);
    }

    .opt:not(:disabled):hover {
      border-color: var(--ios-blue);
      background: rgba(0,122,255,0.04);
      transform: translateX(2px);
    }

    .opt .letter {
      font-size: 13px;
      font-weight: 800;
      min-width: 28px;
      height: 28px;
      border-radius: 10px;
      background: var(--ios-separator);
      color: var(--ios-text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .opt.correct {
      border-color: var(--ios-green);
      background: rgba(52,199,89,0.1);
    }

    .opt.correct .letter {
      background: var(--ios-green);
      color: #fff;
    }

    .opt.wrong {
      border-color: var(--ios-red);
      background: rgba(255,59,48,0.1);
    }

    .opt.wrong .letter {
      background: var(--ios-red);
      color: #fff;
    }

    .feedback {
      background: rgba(0,122,255,0.08);
      border-left: 4px solid var(--ios-blue);
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
      color: var(--ios-text);
    }

    .feedback-section { margin-bottom: 12px; }
    .feedback-section:last-child { margin-bottom: 0; }
    .feedback-label { font-weight: 700; color: var(--ios-blue); margin-bottom: 4px; display: block; font-size: 14px; }

    .btn {
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 14px;
      border: 1.5px solid var(--ios-separator);
      background: transparent;
      color: var(--ios-text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--ios-blue);
      color: var(--ios-blue);
    }

    .btn.primary {
      background: var(--ios-blue);
      border-color: var(--ios-blue);
      color: #fff;
      width: 100%;
      padding: 14px;
      font-size: 16px;
    }

    .btn.primary:hover:not(:disabled) {
      background: #0051D5;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-group .btn {
      flex: 1;
      padding: 14px;
    }

    .control-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--ios-separator);
      gap: 12px;
    }

    .score-indicator {
      font-size: 15px;
      font-weight: 700;
      color: var(--ios-blue);
      background: rgba(0,122,255,0.08);
      padding: 6px 12px;
      border-radius: 12px;
    }

    .ios-input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1.5px solid var(--ios-separator);
      background: var(--ios-bg);
      color: var(--ios-text);
      font-size: 18px;
      text-align: center;
      margin-bottom: 16px;
      outline: none;
      transition: all 0.15s;
      font-family: inherit;
    }

    .ios-input:focus {
      border-color: var(--ios-blue);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
    }

    .start-icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(0,122,255,0.15), rgba(175,82,222,0.15));
      border: 1.5px solid rgba(0,122,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 20px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 20px 0 24px;
    }

    .info-box {
      background: var(--ios-bg);
      border-radius: 16px;
      padding: 16px 12px;
      text-align: center;
      border: 1px solid var(--ios-separator);
    }

    .info-num {
      font-size: 26px;
      font-weight: 800;
      color: var(--ios-blue);
      margin-bottom: 4px;
    }

    .info-lbl {
      font-size: 10px;
      color: var(--ios-text-secondary);
      text-transform: uppercase;
      font-weight: 700;
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .ios-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 99px;
    }

    .score-ring {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,122,255,0.12), rgba(175,82,222,0.12));
      border: 3px solid var(--ios-blue);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .score-pct {
      font-size: 40px;
      font-weight: 800;
      color: var(--ios-blue);
    }

    .score-sub {
      font-size: 12px;
      color: var(--ios-text-secondary);
      font-weight: 600;
      text-transform: uppercase;
    }

    .score-msg {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    /* hCaptcha styling */
    .captcha-wrapper {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      padding: 16px;
      background: var(--ios-bg);
      border-radius: 14px;
      border: 1px solid var(--ios-separator);
    }

    .h-captcha {
      transform: scale(0.9);
      transform-origin: center;
    }

    @media (max-width: 480px) {
      .h-captcha {
        transform: scale(0.85);
      }
    }

    .captcha-error {
      color: var(--ios-red);
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .error-msg {
      color: var(--ios-red);
      font-size: 13px;
      margin-top: 8px;
      display: none;
      text-align: center;
    }

    @media (max-width: 768px) {
      .container { padding: 0 1rem; }
      #quiz-header h1 { font-size: 28px; }
      .q-text { font-size: 18px; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 0.75rem; }
      #quiz-header h1 { font-size: 24px; }
      .q-card, .start-card, .score-card { padding: 18px; }
      .opt { padding: 12px 11px; font-size: 14px; }
      .captcha-wrapper { padding: 12px; margin: 16px 0; }
    }
  </style>
</head>
<body>
<main>
  <div class="container">

    <header id="quiz-header" style="margin-bottom: 2.5rem;">
      <div class="header-badge">
        <span>📡 Redes de Computadores</span>
      </div>
      <h1>Quiz Interativo</h1>
      <p style="font-size: 15px; color: var(--ios-text-secondary); margin-top: 6px;">60 questões • Aprofunde seus conhecimentos</p>
    </header>

    <div class="ios-stat-grid" id="stat-cards" style="display: none;">
      <div class="ios-stat-card">
        <div class="ios-stat-icon">📋</div>
        <div class="ios-stat-value">60</div>
        <div class="ios-stat-label">Questões</div>
      </div>
      <div class="ios-stat-card">
        <div class="ios-stat-icon">✅</div>
        <div class="ios-stat-value" id="stat-score">0</div>
        <div class="ios-stat-label">Corretas</div>
      </div>
      <div class="ios-stat-card">
        <div class="ios-stat-icon">🎯</div>
        <div class="ios-stat-value" id="stat-pct">0%</div>
        <div class="ios-stat-label">Desempenho</div>
      </div>
    </div>

    <div class="progress-wrap" id="progress-wrap" style="display:none;">
      <div class="progress-track"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
      <span class="progress-label" id="plabel">0 / 60</span>
    </div>

    <div id="quiz-content"></div>

  </div>
</main>

<script>
const MASTER_PASSWORD = "1234";
const HCAPTCHA_SITEKEY = "6c308c44-8776-4f5e-9184-195e9484af84";

function getTheme() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

const rawQuestions = [
  { q: "Qual é a função de um ACK?", opts: ["Confirmar o recebimento de dados", "Solicitar retransmissão imediata", "Iniciar uma conexão TCP", "Encapsular dados na camada de rede"], ans: "Confirmar o recebimento de dados", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>ACK (Acknowledgement) confirma ao remetente que os dados foram recebidos corretamente pelo destinatário. Esse mecanismo é fundamental em protocolos confiáveis como TCP.</span></div>` },
  { q: "O que é encapsulamento em redes?", opts: ["Compressão de dados para economizar banda", "Adição de cabeçalhos em cada camada do modelo", "Criptografia de pacotes para segurança", "Fragmentação de pacotes grandes"], ans: "Adição de cabeçalhos em cada camada do modelo", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>O encapsulamento é o processo de adicionar cabeçalhos em cada camada do modelo de rede.</span></div>` },
  { q: "Qual é a principal limitação do protocolo UDP?", opts: ["Velocidade de transmissão muito baixa", "Não garante a entrega dos dados", "Não suporta comunicação multicast", "Consome muita CPU do sistema"], ans: "Não garante a entrega dos dados", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>O UDP não possui mecanismos de confirmação de entrega.</span></div>` },
  { q: "Qual técnica retransmite apenas os pacotes com erro?", opts: ["Go-Back-N", "Stop-and-Wait", "Repetição Seletiva", "Janela deslizante simples"], ans: "Repetição Seletiva", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>Na Repetição Seletiva, apenas os pacotes com erro são retransmitidos.</span></div>` },
  { q: "O que é um sniffer em redes?", opts: ["Um firewall de próxima geração", "Um roteador de alta velocidade", "Ferramenta que captura e analisa pacotes na rede", "Um servidor de DNS recursivo"], ans: "Ferramenta que captura e analisa pacotes na rede", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>Um sniffer é uma ferramenta que monitora e captura o tráfego de rede passivamente.</span></div>` },
  { q: "DNS utiliza TCP ou UDP?", opts: ["Apenas TCP", "Apenas UDP", "Principalmente UDP (porta 53); TCP para transferências de zona", "Nenhum dos dois"], ans: "Principalmente UDP (porta 53); TCP para transferências de zona", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>O DNS usa UDP na porta 53 para consultas comuns, e TCP para transferências de zona.</span></div>` },
  { q: "O que é controle de fluxo?", opts: ["Controlar a velocidade interna do roteador", "Mecanismo que evita que o emissor sobrecarregue o receptor", "Filtrar pacotes indesejados na borda", "Balancear carga entre servidores"], ans: "Mecanismo que evita que o emissor sobrecarregue o receptor", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>O controle de fluxo regula a taxa de envio do emissor para não ultrapassar a capacidade do receptor.</span></div>` },
  { q: "Qual a função principal da janela deslizante?", opts: ["Fragmentar pacotes acima do MTU", "Controlar o fluxo e permitir múltiplos frames em trânsito", "Criptografar o cabeçalho TCP", "Resolver nomes de domínio localmente"], ans: "Controlar o fluxo e permitir múltiplos frames em trânsito", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>A janela deslizante permite que múltiplos quadros sejam enviados antes de receber confirmação.</span></div>` },
  { q: "O que são sistemas finais (hosts)?", opts: ["Roteadores de borda de rede", "Dispositivos que executam aplicações na borda da rede", "Servidores de DNS autoritativos", "Switches de núcleo de datacenter"], ans: "Dispositivos que executam aplicações na borda da rede", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>Sistemas finais são dispositivos como computadores e smartphones que executam aplicações.</span></div>` },
  { q: "Qual é a função do DNS?", opts: ["Rotear pacotes entre redes diferentes", "Traduzir nomes de domínio em endereços IP", "Controlar o acesso à rede local", "Gerenciar endereços MAC na LAN"], ans: "Traduzir nomes de domínio em endereços IP", exp: `<div class="feedback-section"><span class="feedback-label">📌 Explicação:</span><span>O DNS traduz nomes legíveis por humanos em endereços IP numéricos.</span></div>` },
];

let questions = [];
let current = 0, score = 0, answered = [], started = false;
const LETTERS = ['A','B','C','D'];
let captchaCompleted = false;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function updateStats() {
  document.getElementById('stat-score').textContent = score;
  const pct = started ? Math.round((score / questions.length) * 100) : 0;
  document.getElementById('stat-pct').textContent = pct + '%';
}

function onCaptchaSuccess(token) {
  captchaCompleted = true;
  document.getElementById('captcha-error').style.display = 'none';
  console.log('✅ hCaptcha completado');
}

function renderPasswordScreen() {
  document.getElementById('quiz-header').style.display = 'none';
  document.getElementById('stat-cards').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';

  const theme = getTheme();

  document.getElementById('quiz-content').innerHTML = `
    <div class="start-card" id="lock-screen" style="max-width:420px; margin: 0 auto; text-align: center;">
      <div class="start-icon-wrap">🔐</div>
      <h2 class="ios-title2" style="margin-bottom:8px;">Acesso Restrito</h2>
      <p class="ios-subheadline" style="margin-bottom:20px; color: var(--ios-text-secondary);">Complete o CAPTCHA e digite a senha</p>
      
      <div class="captcha-wrapper">
        <div class="h-captcha" 
             data-sitekey="${HCAPTCHA_SITEKEY}"
             data-theme="${theme}"
             data-callback="onCaptchaSuccess">
        </div>
      </div>
      <p class="captcha-error" id="captcha-error">⚠️ Complete o CAPTCHA para continuar</p>

      <p class="ios-subheadline" style="margin: 20px 0 8px; color: var(--ios-text-secondary);">Senha:</p>
      <input type="password" id="pass-input" class="ios-input" placeholder="Insira a senha" autofocus>
      
      <button class="btn primary ios-tappable" onclick="checkPass()" style="border-radius:14px;">🔓 Entrar</button>
      <p id="error-msg" class="error-msg">❌ Senha incorreta!</p>
    </div>`;
}

function checkPass() {
  // Verifica se CAPTCHA foi preenchido
  if (!captchaCompleted) {
    document.getElementById('captcha-error').style.display = 'block';
    return;
  }

  const input = document.getElementById('pass-input');
  
  if (input.value === MASTER_PASSWORD) {
    renderHome();
  } else {
    document.getElementById('lock-screen').classList.add('shake');
    document.getElementById('error-msg').style.display = 'block';
    setTimeout(() => document.getElementById('lock-screen').classList.remove('shake'), 400);
  }
}

function renderHome() {
  captchaCompleted = false; // Reset para próxima autenticação
  document.getElementById('quiz-header').style.display = 'block';
  document.getElementById('stat-cards').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  updateStats();

  document.getElementById('quiz-content').innerHTML = `
    <div class="start-card">
      <div class="start-icon-wrap">🌐</div>
      <h2 class="ios-title2" style="margin-bottom:8px;">Quiz de Redes</h2>
      <p class="ios-body" style="line-height:1.6; color: var(--ios-text-secondary); margin-bottom:24px;">
        Teste seus conhecimentos em protocolos, encapsulamento, DNS, TCP/UDP, sniffers e muito mais com explicações detalhadas.
      </p>
      <div class="info-grid">
        <div class="info-box"><div class="info-num">60</div><div class="info-lbl">Questões</div></div>
        <div class="info-box"><div class="info-num">4</div><div class="info-lbl">Alternativas</div></div>
        <div class="info-box"><div class="info-num">∞</div><div class="info-lbl">Tentativas</div></div>
      </div>
      <div class="topics">
        <span class="ios-badge ios-badge-blue">🔗 TCP/UDP</span>
        <span class="ios-badge ios-badge-blue">🌍 DNS</span>
        <span class="ios-badge ios-badge-blue">📦 Encapsulamento</span>
        <span class="ios-badge ios-badge-blue">↔️ Janela Deslizante</span>
        <span class="ios-badge ios-badge-blue">🔄 Protocolos</span>
        <span class="ios-badge ios-badge-blue">🔍 Análise</span>
      </div>
      <button class="btn primary ios-tappable" onclick="startQuiz()" style="border-radius:16px;">
        ▶️ Iniciar Quiz
      </button>
    </div>`;
}

function startQuiz() {
  questions = shuffle([...rawQuestions]).map(q => ({ ...q, opts: shuffle([...q.opts]) }));
  started = true; current = 0; score = 0; answered = [];
  
  document.getElementById('stat-cards').style.display = 'grid';
  document.getElementById('progress-wrap').style.display = 'flex';
  updateStats();
  render();
}

function render() {
  const total = questions.length;
  document.getElementById('pbar').style.width = Math.round((current / total) * 100) + '%';
  document.getElementById('plabel').textContent = current + ' / ' + total;
  updateStats();

  if (current >= total) { renderScore(); return; }

  const q = questions[current];
  const isAns = answered[current] !== undefined;
  const chosen = answered[current];

  const optsHtml = q.opts.map((o, i) => {
    let cls = 'opt ios-tappable';
    if (isAns) {
      if (o === q.ans) cls += ' correct';
      else if (o === chosen) cls += ' wrong';
    }
    return `<button class="${cls}" ${isAns ? 'disabled' : ''} onclick="choose('${o.replace(/'/g, "\\'")}')">
      <span class="letter">${LETTERS[i]}</span><span>${o}</span>
    </button>`;
  }).join('');

  document.getElementById('quiz-content').innerHTML = `
    <div class="q-card">
      <div class="q-num">QUESTÃO ${current + 1} DE ${total}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      ${isAns ? `<div class="feedback">${q.exp}</div>` : ''}
      <div class="control-bar">
        <button class="btn ios-tappable" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← Anterior</button>
        <span class="score-indicator">${score}/${current + (isAns ? 1 : 0)}</span>
        <button class="btn primary ios-tappable" onclick="next()" ${!isAns ? 'disabled' : ''}>${current === total - 1 ? '✓ Fim' : 'Próxima'} →</button>
      </div>
    </div>`;
}

function choose(choice) {
  if (answered[current] !== undefined) return;
  answered[current] = choice;
  if (choice === questions[current].ans) score++;
  render();
}

function next() { current++; render(); }
function prev() { if (current > 0) { current--; render(); } }

function renderScore() {
  const pct = Math.round((score / questions.length) * 100);
  const resultMsg = pct >= 80 ? '🎉 Excelente!' : pct >= 60 ? '👍 Bom!' : '📚 Continue estudando!';
  
  document.getElementById('quiz-content').innerHTML = `
    <div class="score-card" style="text-align: center;">
      <div class="score-ring">
        <div class="score-pct">${pct}%</div>
        <div class="score-sub">Desempenho</div>
      </div>
      <h2 class="ios-title2">${resultMsg}</h2>
      <p class="ios-body" style="margin-bottom:24px; color: var(--ios-text-secondary);">Você acertou <strong>${score} de ${questions.length}</strong> questões</p>
      <div class="btn-group">
        <button class="btn ios-tappable" onclick="location.reload()">🔄 Reiniciar</button>
        <button class="btn primary ios-tappable" onclick="renderHome()">🏠 Início</button>
      </div>
    </div>`;
  updateStats();
}

renderPasswordScreen();
</script>

</html>
