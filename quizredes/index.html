<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz — Redes de Computadores</title>
  <meta name="color-scheme" content="light dark">
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    :root {
      --ios-bg: #f2f2f7; --ios-card: #ffffff; --ios-text: #1c1c1e;
      --ios-text-secondary: #6e6e73; --ios-blue: #007AFF; --ios-green: #34C759;
      --ios-red: #FF3B30; --ios-purple: #AF52DE;
      --ios-separator: rgba(0,0,0,0.08); --ios-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ios-bg: #000000; --ios-card: #1c1c1e; --ios-text: #f2f2f7;
        --ios-text-secondary: #8e8e93; --ios-separator: rgba(255,255,255,0.08);
        --ios-shadow: 0 4px 20px rgba(0,0,0,0.4);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; background: var(--ios-bg); color: var(--ios-text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    main { flex: 1; display: flex; flex-direction: column; padding-top: 1rem; padding-bottom: 3rem; }
    .container { margin: 0 auto; width: 100%; max-width: 720px; padding: 0 1.25rem; }
    #quiz-header { text-align: center; margin-bottom: 0.5rem; }
    .header-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--ios-blue); background: rgba(0,122,255,0.12); border: 1.5px solid rgba(0,122,255,0.2); border-radius: 20px; padding: 7px 14px; margin-bottom: 12px; }
    #quiz-header h1 { font-size: 36px; font-weight: 800; margin-bottom: 4px; background: linear-gradient(135deg, var(--ios-blue), var(--ios-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .ios-stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .ios-stat-card { background: var(--ios-card); border-radius: 1.3rem; padding: 16px 12px; text-align: center; box-shadow: var(--ios-shadow); border: 1px solid var(--ios-separator); }
    .ios-stat-icon { font-size: 28px; margin-bottom: 8px; }
    .ios-stat-value { font-size: 24px; font-weight: 800; color: var(--ios-blue); }
    .ios-stat-label { font-size: 11px; color: var(--ios-text-secondary); margin-top: 4px; text-transform: uppercase; font-weight: 600; }
    .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 14px 16px; background: var(--ios-card); border-radius: 1.2rem; box-shadow: var(--ios-shadow); border: 1px solid var(--ios-separator); }
    .progress-track { flex: 1; height: 6px; background: var(--ios-separator); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--ios-blue), var(--ios-purple)); border-radius: 99px; transition: width 0.45s cubic-bezier(0.4,0,0.2,1); }
    .progress-label { font-size: 13px; font-weight: 700; color: var(--ios-blue); white-space: nowrap; min-width: 55px; text-align: right; }
    .q-card, .start-card, .score-card { background: var(--ios-card); border-radius: 1.5rem; padding: 24px; box-shadow: var(--ios-shadow); border: 1px solid var(--ios-separator); animation: fadeUp 0.3s ease both; }
    .q-text { font-size: 20px; font-weight: 700; line-height: 1.6; color: var(--ios-text); margin-bottom: 22px; }
    .options { display: flex; flex-direction: column; gap: 11px; margin-bottom: 20px; }
    .opt { display: flex; align-items: flex-start; gap: 14px; padding: 16px; background: var(--ios-bg); border: 1.5px solid var(--ios-separator); border-radius: 16px; cursor: pointer; font-size: 16px; color: var(--ios-text); text-align: left; transition: all 0.15s; width: 100%; }
    .opt:not(:disabled):hover { border-color: var(--ios-blue); background: rgba(0,122,255,0.04); transform: translateX(2px); }
    .opt .letter { font-size: 13px; font-weight: 800; min-width: 28px; height: 28px; border-radius: 10px; background: var(--ios-separator); color: var(--ios-text-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .opt.correct { border-color: var(--ios-green); background: rgba(52,199,89,0.1); }
    .opt.correct .letter { background: var(--ios-green); color: #fff; }
    .opt.wrong { border-color: var(--ios-red); background: rgba(255,59,48,0.1); }
    .opt.wrong .letter { background: var(--ios-red); color: #fff; }
    .feedback { background: rgba(0,122,255,0.08); border-left: 4px solid var(--ios-blue); border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.6; margin-bottom: 20px; color: var(--ios-text); }
    .btn { font-family: inherit; font-size: 16px; font-weight: 700; padding: 12px 20px; border-radius: 14px; border: 1.5px solid var(--ios-separator); background: transparent; color: var(--ios-text-secondary); cursor: pointer; transition: all 0.15s; }
    .btn.primary { background: var(--ios-blue); border-color: var(--ios-blue); color: #fff; width: 100%; padding: 14px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .control-bar { display: flex; justify-content: flex-end; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--ios-separator); }
    .ios-input { width: 100%; padding: 16px; border-radius: 16px; border: 1.5px solid var(--ios-separator); background: var(--ios-bg); color: var(--ios-text); font-size: 18px; text-align: center; margin-bottom: 16px; outline: none; }
    .captcha-wrapper { display: flex; justify-content: center; margin: 20px 0; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
    .spinner { width: 30px; height: 30px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader"><div class="spinner"></div></div>

<main>
  <div class="container">
    <header id="quiz-header">
      <div class="header-badge">📡 Redes de Computadores</div>
      <h1>Quiz Interativo</h1>
    </header>

    <div class="ios-stat-grid" id="stat-cards" style="display: none;">
      <div class="ios-stat-card"><div class="ios-stat-icon">📋</div><div class="ios-stat-value">70</div><div class="ios-stat-label">Questões</div></div>
      <div class="ios-stat-card"><div class="ios-stat-icon">✅</div><div class="ios-stat-value" id="stat-score">0</div><div class="ios-stat-label">Corretas</div></div>
      <div class="ios-stat-card"><div class="ios-stat-icon">🎯</div><div class="ios-stat-value" id="stat-pct">0%</div><div class="ios-stat-label">Desempenho</div></div>
    </div>

    <div class="progress-wrap" id="progress-wrap" style="display:none;">
      <div class="progress-track"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
      <span class="progress-label" id="plabel">0 / 70</span>
    </div>

    <div id="quiz-content"></div>
  </div>
</main>

<script>
// CONFIGURAÇÕES
const WORKER_URL = 'https://noisy-thunder-c614.aguiarpassaroni.workers.dev';
const HCAPTCHA_SITEKEY = '6c308c44-8776-4f5e-9184-195e9484af84';

let sessionToken = null;
let currentQuestionId = null;
let score = 0;
let respondidasCount = 0;
const TOTAL_QUESTOES = 70;
const LETTERS = ['A', 'B', 'C', 'D'];

// --- UTILITÁRIOS ---
function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

function onCaptchaSuccess(token) {
    window.captchaToken = token;
    document.getElementById('captcha-error')?.remove();
}

function updateStats() {
    document.getElementById('stat-score').textContent = score;
    const pct = respondidasCount > 0 ? Math.round((score / respondidasCount) * 100) : 0;
    document.getElementById('stat-pct').textContent = pct + '%';
}

// --- TELAS ---
function renderPasswordScreen() {
    document.getElementById('quiz-header').style.display = 'block';
    document.getElementById('quiz-content').innerHTML = `
        <div class="start-card" style="max-width:420px;margin:0 auto;text-align:center;">
            <h2 style="margin-bottom:15px;">Acesso Restrito</h2>
            <div class="captcha-wrapper">
                <div class="h-captcha" data-sitekey="${HCAPTCHA_SITEKEY}" data-callback="onCaptchaSuccess"></div>
            </div>
            <p id="captcha-error" style="color:var(--ios-red);display:none;margin-bottom:10px;">Complete o Captcha</p>
            <input type="password" id="pass-input" class="ios-input" placeholder="Senha do Quiz">
            <button class="btn primary" onclick="checkPass()">🔓 Entrar</button>
        </div>`;
}

async function checkPass() {
    const password = document.getElementById('pass-input').value;
    if (!window.captchaToken) { document.getElementById('captcha-error').style.display = 'block'; return; }
    
    showLoader(true);
    try {
        const res = await fetch(`${WORKER_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password, token: window.captchaToken })
        });
        const data = await res.json();
        if (data.session) {
            sessionToken = data.session;
            sessionStorage.setItem('quiz_session', sessionToken);
            renderHome();
        } else {
            alert(data.error || "Acesso negado");
            if(window.hcaptcha) hcaptcha.reset();
        }
    } catch(e) { alert("Erro de conexão com o servidor."); }
    showLoader(false);
}

function renderHome() {
    document.getElementById('stat-cards').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('quiz-content').innerHTML = `
        <div class="start-card" style="text-align:center;">
            <div style="font-size:40px;margin-bottom:15px;">🌐</div>
            <h2>Pronto para começar?</h2>
            <p style="color:var(--ios-text-secondary);margin:15px 0;">As perguntas serão sorteadas aleatoriamente pelo servidor.</p>
            <button class="btn primary" onclick="startQuiz()">▶️ Iniciar Agora</button>
        </div>`;
}

// --- LÓGICA DO QUIZ ---
function startQuiz() {
    score = 0; respondidasCount = 0;
    document.getElementById('stat-cards').style.display = 'grid';
    document.getElementById('progress-wrap').style.display = 'flex';
    fetchNextQuestion();
}

async function fetchNextQuestion() {
    showLoader(true);
    try {
        const res = await fetch(`${WORKER_URL}/get-question`, {
            headers: { 'Authorization': sessionToken }
        });
        const data = await res.json();

        if (data.finished) { renderScore(); return; }

        currentQuestionId = data.id;
        renderQuestion(data);
    } catch(e) { alert("Erro ao carregar questão."); }
    showLoader(false);
}

function renderQuestion(data) {
    const optsHtml = data.opts.map((o, i) => `
        <button class="opt" onclick="submitAnswer('${o.replace(/'/g, "\\'")}', this)">
            <span class="letter">${LETTERS[i]}</span><span>${o}</span>
        </button>
    `).join('');

    document.getElementById('pbar').style.width = Math.round((respondidasCount / TOTAL_QUESTOES) * 100) + '%';
    document.getElementById('plabel').textContent = respondidasCount + ' / ' + TOTAL_QUESTOES;

    document.getElementById('quiz-content').innerHTML = `
        <div class="q-card">
            <div class="q-text">${data.q}</div>
            <div class="options" id="opts-container">${optsHtml}</div>
            <div id="feedback-area"></div>
            <div class="control-bar" id="nav-bar" style="display:none;">
                <button class="btn primary" style="width:auto;" onclick="fetchNextQuestion()">Próxima Questão →</button>
            </div>
        </div>`;
}

async function submitAnswer(choice, btn) {
    document.getElementById('opts-container').style.pointerEvents = 'none';
    showLoader(true);

    try {
        const res = await fetch(`${WORKER_URL}/validar-resposta`, {
            method: 'POST',
            headers: { 'Authorization': sessionToken, 'Content-Type': 'application/json' },
            body: JSON.stringify({ questionId: currentQuestionId, userAnswer: choice })
        });
        const data = await res.json();

        const buttons = document.querySelectorAll('.opt');
        buttons.forEach(b => {
            const text = b.querySelector('span:last-child').innerText;
            if (text === data.correctAnswer) b.classList.add('correct');
            else if (text === choice && !data.isCorrect) b.classList.add('wrong');
        });

        if (data.isCorrect) score++;
        respondidasCount++;
        updateStats();

        document.getElementById('feedback-area').innerHTML = `<div class="feedback"><strong>${data.isCorrect ? '✅ Acertou!' : '❌ Errou!'}</strong><br>${data.explanation}</div>`;
        document.getElementById('nav-bar').style.display = 'flex';
    } catch(e) { alert("Erro ao validar."); }
    showLoader(false);
}

function renderScore() {
    const pct = Math.round((score / TOTAL_QUESTOES) * 100);
    document.getElementById('quiz-content').innerHTML = `
        <div class="score-card" style="text-align:center;">
            <h2 style="font-size:32px;">${pct}%</h2>
            <p>Você acertou ${score} de ${TOTAL_QUESTOES} questões.</p>
            <button class="btn primary" style="margin-top:20px;" onclick="location.reload()">🔄 Reiniciar</button>
        </div>`;
}

// Início
const saved = sessionStorage.getItem('quiz_session');
if (saved) { sessionToken = saved; renderHome(); } else { renderPasswordScreen(); }
</script>
</body>
</html>
