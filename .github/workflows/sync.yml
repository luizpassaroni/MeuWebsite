name: Sincronizar Google Drive
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Atualizado para v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Adicionado para garantir a versão correta
        with:
          node-version: '20' # Mantendo 20 por estabilidade ou 24 se preferir

      - name: Instalar Dependências
        run: npm install googleapis axios

      - name: Rodar Script de Sincronização
        run: node update-downloads.js
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Salvar Mudanças no Repositório
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add downloads/arquivos.json
          git commit -m "update: lista de downloads atualizada via drive" || exit 0
          git push